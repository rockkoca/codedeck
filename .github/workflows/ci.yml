name: CI

on:
  push:
    branches: [main, master, dev]
    tags: ['v*']
  pull_request:
    branches: [main, master]

env:
  NODE_VERSION_PRIMARY: '22'

jobs:
  # ── Lint ──────────────────────────────────────────────────────────────────

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION_PRIMARY }}
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  # ── Typecheck (daemon + server) ───────────────────────────────────────────

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION_PRIMARY }}
          cache: 'npm'
      - run: npm ci
      - name: Install server deps
        run: npm ci
        working-directory: server
      - name: Daemon
        run: npx tsc --noEmit
      - name: Server
        run: npx tsc --noEmit
        working-directory: server

  # ── Secret scanning ────────────────────────────────────────────────────────

  secret-scan:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Daemon unit tests ─────────────────────────────────────────────────────

  unit-tests:
    name: Unit Tests (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
      - run: npm ci
      - run: npm run test:unit

  # ── Web frontend tests ────────────────────────────────────────────────────

  web-tests:
    name: Web Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION_PRIMARY }}
          cache: 'npm'
      - run: npm ci
      - run: npm run test:web

  # ── Server unit tests ─────────────────────────────────────────────────────

  server-tests:
    name: Server Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION_PRIMARY }}
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run test:server
      - run: npm ci
        working-directory: server
      - name: Run server-native tests (auth-flow, proxy-addr — require server/node_modules)
        run: npm test
        working-directory: server

  # ── Server DB integration tests (testcontainers + real PostgreSQL) ─────────

  server-db-tests:
    name: Server DB Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION_PRIMARY }}
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - run: npm ci
        working-directory: server
      - name: Run DB integration tests
        run: npm run test:integration
        working-directory: server
        env:
          TESTCONTAINERS_RYUK_DISABLED: 'true'

  # ── E2E tests (tmux installed — tests run for real) ──────────────────────

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION_PRIMARY }}
          cache: 'npm'
      - name: Install tmux
        run: sudo apt-get install -y tmux
      - name: Prime tmux server (ensures socket dir exists)
        run: tmux new-session -d -s init && tmux kill-session -t init
      - run: npm ci
      - name: Run pipe-pane e2e tests
        run: npx vitest run test/e2e/pipe-pane-stream.test.ts
      - name: Run other e2e tests (tmux-dependent tests skipped — claude not installed in CI)
        run: npm run test:e2e
        env:
          SKIP_TMUX_TESTS: '1'

  # ── Coverage ──────────────────────────────────────────────────────────────

  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [unit-tests, web-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION_PRIMARY }}
          cache: 'npm'
      - run: npm ci
      - run: npm run test:coverage
        env:
          SKIP_TMUX_TESTS: '1'
      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
      - name: Comment PR with coverage diff
        if: github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2

  # ── Publish to npm ────────────────────────────────────────────────────────

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [lint, typecheck, secret-scan, unit-tests, web-tests, server-tests, server-db-tests, e2e-tests]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION_PRIMARY }}
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm run build
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
