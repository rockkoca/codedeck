name: Docker Release

on:
  push:
    branches: [main, master]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '.gitleaks.toml'
  workflow_dispatch:

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE: rockkoca/codedeck

jobs:
  docker:
    name: Build & Push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve tags
        id: tags
        run: |
          set -euo pipefail
          DATE_TAG="v$(date -u +%Y.%-m.%-d)"
          SHA_SHORT="${GITHUB_SHA::7}"
          TAGS="${IMAGE}:latest"
          TAGS="${TAGS},${IMAGE}:${DATE_TAG}"
          TAGS="${TAGS},${IMAGE}:${DATE_TAG}-${SHA_SHORT}"
          TAGS="${TAGS},${IMAGE}:sha-${SHA_SHORT}"
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "date_tag=${DATE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          platforms: linux/amd64
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: true

      - name: Create git tag
        if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch --tags
          DATE_TAG="${{ steps.tags.outputs.date_tag }}"
          # If tag already exists for today, append build number
          EXISTING=$(git tag -l "${DATE_TAG}*" | wc -l)
          if [ "$EXISTING" -gt 0 ]; then
            NEXT=$((EXISTING + 1))
            DATE_TAG="${DATE_TAG}.${NEXT}"
          fi
          git tag "$DATE_TAG"
          git push origin "$DATE_TAG"
